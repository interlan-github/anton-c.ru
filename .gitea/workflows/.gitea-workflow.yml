name: Build and Deploy Vue App

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Cache Node modules
        id: cache-npm
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Setup Node.js environment
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: Install pnpm
        run: npm install --g corepack@latest && npm install -g typescript

      - name: Install dependencies
        if: steps.cache-npm.outputs.cache-hit != 'true'
        run: pnpm install
      
      - name: Build application
        run: export BASE_PATH="/" && export PORT=3000 && pnpm run build
      
      - name: Deploy to server via SFTP (/tmp)
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          password: ${{ secrets.PROD_PASSWORD }}
          port: 22
          source: "./artifacts/resume-site/dist/public/"
          target: "/tmp"

      - name: Rsync on remote server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          password: ${{ secrets.PROD_PASSWORD }}
          port: 22
          script: |
            sudo rsync -az --delete-after \
              /tmp/artifacts/resume-site/dist/public/ \
              /var/www/vhosts/anton-c.ru/
            sudo chown -R www-data:www-data /var/www/vhosts/anton-c.ru/
