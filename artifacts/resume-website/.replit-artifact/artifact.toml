kind = "web"
previewPath = "/"
title = "DevOps Resume Website"
version = "1.0.0"
id = "artifacts/resume-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22695

[services.development]
run = "pnpm --filter @workspace/resume-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/resume-website", "run", "build" ]
publicDir = "artifacts/resume-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22695"
BASE_PATH = "/"
